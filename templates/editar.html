<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado SENAI - Editar Item</title>
    <link rel="stylesheet" href="../static/item.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #1a2e6b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 2000;
        }
        .btn-toggle-bars {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin-right: 15px;
        }
        .app-container {
            display: flex;
            margin-top: 60px;
            height: calc(100vh - 60px);
            width: 100%;
        }
        .sidebar {
            width: 260px;
            background-color: #1a2e6b;
            transition: width 0.3s ease, min-width 0.3s ease !important;
            height: 100%;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .sidebar.collapsed {
            width: 70px !important;
            min-width: 70px !important;
        }
        .sidebar nav ul {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        .sidebar nav ul li a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .sidebar nav ul li a i {
            font-size: 18px;
            min-width: 30px;
            text-align: center;
        }
        .sidebar.collapsed nav ul li a span {
            display: none !important;
        }
        .sidebar.collapsed nav ul li a {
            justify-content: center;
            padding: 12px 0;
        }
        .sidebar nav ul li a:hover, .sidebar nav ul li.active a {
            background-color: #f59e0b;
            border-radius: 0 20px 20px 0;
        }
        .sidebar.collapsed nav ul li a:hover, .sidebar.collapsed nav ul li.active a {
            border-radius: 10px;
            width: 50px;
            margin: 0 auto;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        /* Dropdown Perfil */
        .custom-user-profile {
            position: relative !important;
            cursor: pointer !important;
            color: white !important;
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            padding: 5px 10px !important;
            height: 100% !important;
            user-select: none !important;
        }
        .custom-user-profile i.fa-circle-user {
            font-size: 24px !important; 
            color: white !important;
        }
        .custom-user-profile .username-text {
            font-size: 16px !important;
            font-weight: 600 !important;
            color: white !important;
            display: flex !important;
            align-items: center !important;
            gap: 6px !important;
        }
        .custom-dropdown-menu {
            display: none !important;
            position: absolute !important;
            top: 48px !important;
            right: 0 !important;
            background-color: white !important;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15) !important;
            border-radius: 12px !important;
            padding: 12px 0 !important;
            min-width: 200px !important;
            z-index: 99999 !important;
        }
        .custom-dropdown-menu a {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 12px 20px !important;
            color: #333333 !important;
            text-decoration: none !important;
            font-size: 15px !important;
            font-weight: 500 !important;
        }
        .custom-dropdown-menu a.logout-item { color: #ef4444 !important; }
        .custom-user-profile:hover .custom-dropdown-menu { display: block !important; }

        /* ================= MODELO DE FORMULÁRIO CADASTRAR NOVO ITEM ================= */
        .page-header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 1000px;
            margin: 0 auto 20px auto;
        }
        .btn-back {
            color: #1a2e6b;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .btn-back:hover {
            color: #f59e0b;
        }
        .form-card {
            background-color: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #eef2f6;
            max-width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        .form-row-2 {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
        }
        .form-row-3 {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 0;
        }
        .form-group-full {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }
        .form-group label, .form-group-full label {
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 10px;
            padding-left: 5px;
        }
        .form-group input, .form-group select, .form-group-full input, .form-group-full textarea {
            width: 100%;
            padding: 14px 24px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            background-color: #f8fafc;
            color: #334155;
            transition: all 0.2s ease;
        }
        .form-group select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a5568' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 16px;
            padding-right: 45px;
        }
        .form-group input:focus, .form-group select:focus, .form-group-full input:focus, .form-group-full textarea:focus {
            border-color: #1a2e6b;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(26, 46, 107, 0.05);
        }
        
        /* Inputs desabilitados ou somente leitura (Fundo cinza bloqueado) */
        .form-group input[readonly] {
            background-color: #f1f5f9 !important;
            color: #94a3b8 !important;
            cursor: not-allowed !important;
            border-color: #e2e8f0 !important;
        }
        
        .form-group-full textarea {
            border-radius: 20px;
            resize: none;
            padding: 18px 24px;
        }
        .actions-container {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-top: 10px;
        }
        .btn-save {
            background-color: #f59e0b;
            color: white;
            font-weight: 600;
            padding: 14px 40px;
            border-radius: 25px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }
        .btn-save:hover {
            background-color: #d97706;
        }
        .btn-save:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <header class="header">
        <div style="display: flex; align-items: center;">
            <button id="sidebarToggle" class="btn-toggle-bars" type="button">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="brand-align" style="display: flex; align-items: center; gap: 16px; height: 100%;">
<img src="https://www.imagemhost.com.br/images/2024/11/22/Logo-novo-SENAI_-sem-slogan_755X325.png" alt="Logo SENAI" style="max-height: 38px; object-fit: contain; filter: brightness(0) invert(1);">                <div style="width: 2px; height: 24px; background-color: rgba(255, 255, 255, 0.35); border-radius: 2px;"></div>
                <span style="margin: 0; font-size: 20px; font-weight: 600; color: white; letter-spacing: 1px; text-transform: uppercase;">Almoxarifado</span>
            </div>
        </div>

        <div class="custom-user-profile">
            <i class="fa-solid fa-circle-user"></i>
            <span class="username-text">
                admin <i class="fa-solid fa-chevron-down" style="font-size: 11px;"></i>
            </span>
            <div class="custom-dropdown-menu">
                <a href="/trocar_perfil"><i class="fa-solid fa-user-gear"></i> Trocar de Perfil</a>
                <a href="/atualizar_perfil"><i class="fa-solid fa-address-card"></i> Atualizar Perfil</a>
                <a href="/logout" class="logout-item"><i class="fa-solid fa-right-from-bracket"></i> Sair / Logout</a>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="mySidebar">
            <nav>
                <ul>
                    <li><a href="/home"><i class="fa-solid fa-house"></i> <span>Home</span></a></li>
                    <li><a href="/cadastrar_item"><i class="fa-solid fa-plus"></i> <span>Cadastrar item</span></a></li>
                    <li><a href="/movimentacao"><i class="fa-solid fa-arrows-rotate"></i> <span>Movimentações</span></a></li>
                    <li><a href="/cadastrar_usuario"><i class="fa-solid fa-users"></i> <span>Usuários</span></a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-content">
            <div class="page-header-actions">
                <a href="/home" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
                <h2 style="color: #1a2e6b; margin: 0; font-weight: 600; font-size: 22px;"><i class="fa-solid fa-box" style="margin-right: 10px; color: #f59e0b;"></i> Editar Detalhes do Item</h2>
            </div>
            
            <div class="form-card">
                <form action="/atualizar_item" method="POST">
                    <input type="hidden" name="item_id" value="{{ item.id }}">

                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="nome">Nome do Produto (Apenas Visualização)</label>
                            <input type="text" id="nome" name="nome" value="{{ item.nome }}" readonly>
                        </div>
                        <div class="form-group">
                            <label for="categoria">Categoria / Área</label>
                            <select id="categoria" name="categoria">
                                <option value="Geral" {% if item.categoria == 'Geral' %}selected{% endif %}>Geral</option>
                                <option value="Mecânica" {% if item.categoria == 'Mecânica' %}selected{% endif %}>Mecânica</option>
                                <option value="Elétrica" {% if item.categoria == 'Elétrica' %}selected{% endif %}>Elétrica</option>
                                <option value="Manual" {% if item.categoria == 'Manual' %}selected{% endif %}>Manual</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row-3">
                        <div class="form-group">
                            <label for="quantidade">Quantidade (Apenas Visualização)</label>
                            <input type="number" id="quantidade" name="quantidade" value="{{ item.quantidade or 0 }}" readonly>
                        </div>
                        <div class="form-group">
                            <label for="preco">Preço Unitário (R$)</label>
                            <input type="text" id="preco" name="preco" value="{{ item.preco or '0,00' }}">
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label for="link_midia">Link da Imagem (Opcional)</label>
                            <input type="url" id="link_midia" name="link_midia" value="{{ item.link_midia or '' }}" placeholder="https://exemplo.com/imagem.png">
                        </div>
                    </div>

                    <div class="form-group-full">
                        <label for="descricao">Descrição Completa</label>
                        <textarea id="descricao" name="descricao" rows="5" placeholder="Escreva detalhes adicionais sobre as especificações do item...">{{ item.descricao }}</textarea>
                    </div>

                    <div class="actions-container">
                        <button type="submit" class="btn-save">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('mySidebar');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }
        });
    </script>
</body>
</html>
