<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado SENAI - Cadastrar Usuário</title>
    <link rel="stylesheet" href="../static/item.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #1a2e6b;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 2000;
        }
        .btn-toggle-bars {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin-right: 15px;
        }
        .app-container {
            display: flex;
            margin-top: 60px;
            height: calc(100vh - 60px);
            width: 100%;
        }
        .sidebar {
            width: 260px;
            background-color: #1a2e6b;
            transition: width 0.3s ease, min-width 0.3s ease !important;
            height: 100%;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .sidebar.collapsed {
            width: 70px !important;
            min-width: 70px !important;
        }
        .sidebar nav ul {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        .sidebar nav ul li a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .sidebar nav ul li a i {
            font-size: 18px;
            min-width: 30px;
            text-align: center;
        }
        .sidebar.collapsed nav ul li a span {
            display: none !important;
        }
        .sidebar.collapsed nav ul li a {
            justify-content: center;
            padding: 12px 0;
        }
        .sidebar nav ul li a:hover, .sidebar nav ul li.active a {
            background-color: #f59e0b;
            border-radius: 0 20px 20px 0;
        }
        .sidebar.collapsed nav ul li a:hover, .sidebar.collapsed nav ul li.active a {
            border-radius: 10px;
            width: 50px;
            margin: 0 auto;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        /* ================= DROPDOWN CORRIGIDO COM HOVER LARANJA ================= */
        .custom-user-profile {
            position: relative !important;
            cursor: pointer !important;
            color: white !important;
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            padding: 5px 10px !important;
            height: 100% !important;
            user-select: none !important;
            transition: color 0.2s ease !important;
        }
        /* Cor padrão: Branco */
        .custom-user-profile i.fa-circle-user {
            font-size: 24px !important; 
            color: white !important;
            transition: color 0.2s ease !important;
        }
        .custom-user-profile .username-text {
            font-size: 16px !important;
            font-weight: 600 !important;
            color: white !important;
            display: flex !important;
            align-items: center !important;
            gap: 6px !important;
            transition: color 0.2s ease !important;
        }
        
        /* SÓ FICA LARANJA AO PASSAR O MOUSE (HOVER) */
        .custom-user-profile:hover {
            color: #f59e0b !important;
        }
        .custom-user-profile:hover i.fa-circle-user,
        .custom-user-profile:hover .username-text {
            color: #f59e0b !important;
        }

        /* Menu suspenso */
        .custom-dropdown-menu {
            display: none !important;
            position: absolute !important;
            top: 48px !important;
            right: 0 !important;
            background-color: white !important;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15) !important;
            border-radius: 12px !important;
            padding: 12px 0 !important;
            min-width: 200px !important;
            z-index: 99999 !important;
            text-align: left !important;
        }
        .custom-dropdown-menu a {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 12px 20px !important;
            color: #333333 !important;
            text-decoration: none !important;
            font-size: 15px !important;
            font-weight: 500 !important;
            font-family: 'Poppins', sans-serif !important;
            transition: background 0.2s !important;
        }
        .custom-dropdown-menu a i {
            font-size: 16px !important;
            width: 22px !important;
            text-align: center !important;
            color: #4a5568 !important;
        }
        .custom-dropdown-menu a:hover {
            background-color: #f5f7fa !important;
        }
        .custom-dropdown-menu a.logout-item {
            color: #ef4444 !important;
        }
        .custom-dropdown-menu a.logout-item i {
            color: #ef4444 !important;
        }
        .custom-user-profile:hover .custom-dropdown-menu {
            display: block !important;
        }
        
        /* Estilos do Formulário */
        .form-card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #1a2e6b;
        }
        .btn-save {
            background-color: #1a2e6b;
            color: white;
            font-weight: 600;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-save:hover {
            background-color: #11204d;
        }
    </style>
</head>
<body>

    <header class="header">
        <div style="display: flex; align-items: center;">
            <button id="sidebarToggle" class="btn-toggle-bars" type="button">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="brand-align" style="display: flex; align-items: center; gap: 16px; height: 100%;">
                <img src="https://www.imagemhost.com.br/images/2024/11/22/Logo-novo-SENAI_-sem-slogan_755X325.png" alt="Logo SENAI" style="max-height: 38px; object-fit: contain; filter: brightness(0) invert(1) drop-shadow(0px 0px 0px #fff) contrast(1) hue-rotate(320deg) saturate(20); mix-blend-mode: screen;">
                <div style="width: 2px; height: 24px; background-color: rgba(255, 255, 255, 0.35); border-radius: 2px;"></div>
                <span style="margin: 0; font-size: 20px; font-weight: 600; color: white; letter-spacing: 1px; text-transform: uppercase;">Almoxarifado</span>
            </div>
        </div>

        <div class="custom-user-profile">
            <i class="fa-solid fa-circle-user"></i>
            <span class="username-text">
                admin <i class="fa-solid fa-chevron-down" style="font-size: 11px;"></i>
            </span>
            <div class="custom-dropdown-menu">
                <a href="/trocar_perfil"><i class="fa-solid fa-user-gear"></i> Trocar de Perfil</a>
                <a href="/atualizar_perfil"><i class="fa-solid fa-address-card"></i> Atualizar Perfil</a>
                <a href="/logout" class="logout-item"><i class="fa-solid fa-right-from-bracket"></i> Sair / Logout</a>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar" id="mySidebar">
            <nav>
                <ul>
                    <li><a href="/home"><i class="fa-solid fa-house"></i> <span>Home</span></a></li>
                    <li><a href="/cadastrar_item"><i class="fa-solid fa-plus"></i> <span>Cadastrar item</span></a></li>
                    <li><a href="/movimentacao"><i class="fa-solid fa-arrows-rotate"></i> <span>Movimentações</span></a></li>
                    <li class="active"><a href="/cadastrar_usuario"><i class="fa-solid fa-users"></i> <span>Usuários</span></a></li>
                </ul>
            </nav>
        </aside>

        <div class="main-content">
            <main class="container">
                <h2 style="color: #1a2e6b; margin-bottom: 25px; text-align: center;"><i class="fa-solid fa-user-plus" style="margin-right: 10px;"></i> Cadastrar Novo Usuário</h2>
                
                <div class="form-card">
                    <form action="/cadastrar_usuario" method="POST">
                        <div class="form-group">
                            <label for="username">Nome de Usuário</label>
                            <input type="text" id="username" name="username" placeholder="Ex: joao.silva" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Senha</label>
                            <input type="password" id="password" name="password" placeholder="Digite a senha" required>
                        </div>
                        <div class="form-group">
                            <label for="role">Nível de Acesso</label>
                            <select id="role" name="role">
                                <option value="Operador">Operador</option>
                                <option value="Administrador">Administrador</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-save">Salvar Usuário</button>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('mySidebar');
            if (sidebarToggle) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }
        });
    </script>
</body>
</html>
