<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado SENAI - Login</title>
    <link rel="stylesheet" href="/static/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <section class="login-section">
            <div class="login-box">
                <img src="/static/logo-senai.png" alt="Logo SENAI" class="logo-img" onerror="this.style.display='none'">
                
                <h2 class="title">Almoxarifado</h2>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert" style="color: #ff4d4d; margin-bottom: 15px; font-weight: 600; font-size: 14px;">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form action="/logar" method="POST">
                    <div class="input-group">
                        <label for="usuario">Usuário</label>
                        <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                    </div>
                    
                    <button type="submit" class="btn-submit">Entrar</button>
                    
                    <a href="#" class="forgot-password">Esqueceu sua senha?</a>
                </form>
            </div>
        </section>

        <section class="image-section"></section>
    </div>
</body>
</html>
