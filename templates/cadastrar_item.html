<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado SENAI - Cadastrar Item</title>
    <link rel="stylesheet" href="../static/item.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-menu-toggle"><i class="fa-solid fa-bars"></i></div>
        <nav>
            <ul>
                <li><a href="/home">Home</a></li>
                <li class="active"><a href="/cadastrar_item">Cadastrar item</a></li>
                <li><a href="/movimentacao">Movimentações</a></li>
                <li><a href="/cadastrar_usuario">Usuários</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-content">
        <header class="header">
            <div class="brand-align"><h1>Almoxarifado SENAI</h1></div>
            <div class="user-profile">
                <i class="fa-solid fa-circle-user"></i>
                <span class="username">admin</span>
            </div>
        </header>

        <main class="container">
            <div class="title-section">
                <h2>Cadastro de Material</h2>
                <p>Preencha os dados abaixo para registrar um novo item no estoque</p>
            </div>

            <div class="form-card">
                <form action="/salvar_item" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome">Nome do Item</label>
                            <input type="text" id="nome" name="nome" placeholder="Ex: Chave Phillips 1/4" required>
                        </div>
                        <div class="form-group">
                            <label for="categoria">Categoria / Área</label>
                            <select id="categoria" name="categoria" required>
                                <option value="Geral">Geral</option>
                                <option value="Mecânica">Mecânica</option>
                                <option value="Elétrica">Elétrica</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantidade">Quantidade Inicial</label>
                            <input type="number" id="quantidade" name="quantidade" placeholder="0" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="minimo">Estoque Mínimo</label>
                            <input type="number" id="minimo" name="minimo" placeholder="Ex: 5" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="preco">Preço Unitário (R$)</label>
                            <input type="number" id="preco" name="preco" step="0.01" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="descricao">Descrição Breve</label>
                            <textarea id="descricao" name="descricao" placeholder="Detalhes sobre as especificações do item..."></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-salvar">Salvar Cadastro</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
