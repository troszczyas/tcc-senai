<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado SENAI - Cadastrar Item</title>
    <link rel="stylesheet" href="../static/item.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li class="active"><a href="cadastrar_item.html">Cadastrar item</a></li>
                <li><a href="movimentacao.html">Movimentações</a></li>
                <li><a href="cadastrar_usuario.html">Usuários</a></li>
            </ul>
        </nav>
    </aside>

    <div class="main-content">
        
        <header class="header">
            <div class="brand-align">
                <h1>Almoxarifado SENAI</h1>
            </div>
            <div class="user-profile">
                <i class="fa-solid fa-circle-user"></i>
                <span class="username">admin</span>
            </div>
        </header>

        <main class="container">
            <div class="title-section">
                <h2>Cadastrar item</h2>
                <p>Preencha os dados do item abaixo</p>
            </div>

            <div class="form-card">
                <form id="form-cadastro-item">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome">Nome do item</label>
                            <input type="text" id="nome" placeholder="Ex: parafuso 3/8" required>
                        </div>

                        <div class="form-group">
                            <label for="categoria">Categoria</label>
                            <select id="categoria" required>
                                <option value="" disabled selected>selecione a categoria</option>
                                <option value="ferramentas">Ferramentas</option>
                                <option value="parafusos">Parafusos/Fixadores</option>
                                <option value="eletronicos">Eletrônicos</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantidade">Quantidade</label>
                            <input type="text" id="quantidade" placeholder="Ex: 100" required>
                        </div>

                        <div class="form-group">
                            <label for="estoque-minimo">Estoque mínimo</label>
                            <input type="text" id="estoque-minimo" placeholder="Ex: 10" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="descricao">Descrição</label>
                            <textarea id="descricao" placeholder="Descreva o item.."></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="preco">Preço (R$)</label>
                            <input type="text" id="preco" placeholder="Ex: 0,00" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-cancelar" id="btn-cancelar">Cancelar</button>
                        <button type="submit" class="btn btn-confirmar">Confirmar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div class="popup-overlay" id="popup-sucesso">
        <div class="popup-box">
            <i class="fa-solid fa-circle-check"></i>
            <h3>Sucesso!</h3>
            <p>Item cadastrado com sucesso.</p>
        </div>
    </div>

    <script>
        const formItem = document.getElementById('form-cadastro-item');
        const popupSucesso = document.getElementById('popup-sucesso');
        const btnCancelar = document.getElementById('btn-cancelar');

        formItem.addEventListener('submit', function(event) {
            event.preventDefault(); 
            popupSucesso.classList.add('active');
            formItem.reset();

            setTimeout(() => {
                popupSucesso.classList.remove('active');
            }, 2500);
        });

        btnCancelar.addEventListener('click', function() {
            if(confirm("Deseja realmente limpar os campos preenchidos?")) {
                formItem.reset();
            }
        });
    </script>

</body>
</html>
